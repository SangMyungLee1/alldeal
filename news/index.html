<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>올딜 NEW'S</title>
<meta name="description" content="정치, 경제, 사회, IT/과학, 생활문화 뉴스 다이제스트">
<style>
  :root {
    --bg: #f5f6f8; --card-bg: #ffffff; --text: #1a1a1a;
    --text-muted: #6b7280; --accent: #2563eb; --border: #e5e7eb; --badge-bg: #eef2ff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #15171c; --card-bg: #1e2128; --text: #e8e8ea;
      --text-muted: #9aa0aa; --accent: #6ea8ff; --border: #2c303a; --badge-bg: #23283a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0 16px 64px; background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif; line-height: 1.55;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  nav { max-width: 720px; margin: 0 auto; padding: 18px 0; }
  nav .brand { font-weight: 800; font-size: 1.15rem; color: var(--text); text-decoration: none; }
  header.hero { text-align: center; padding: 20px 0 30px; }
  header.hero h1 { font-size: 1.9rem; margin: 0 0 8px; }
  header.hero p { color: var(--text-muted); margin: 0; font-size: 0.92rem; }
  h2.section-title {
    font-size: 1.08rem; margin: 34px 0 12px; padding-bottom: 6px; border-bottom: 2px solid var(--accent);
    display: inline-block;
  }
  .list { display: flex; flex-direction: column; gap: 10px; }
  .item {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 15px 18px; text-decoration: none; color: var(--text);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    transition: border-color .15s ease, transform .15s ease;
  }
  .item:hover { border-color: var(--accent); transform: translateX(2px); }
  .item .t { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .item .badge {
    flex: none; background: var(--badge-bg); color: var(--accent);
    font-size: 0.72rem; font-weight: 700; padding: 3px 9px; border-radius: 999px;
  }
  .item h3 { margin: 0; font-size: 0.98rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item .date { flex: none; color: var(--text-muted); font-size: 0.78rem; }
  .item.hidden { display: none; }
  .more-btn {
    margin-top: 10px; width: 100%; padding: 11px; border: 1px solid var(--border);
    border-radius: 10px; background: var(--card-bg); color: var(--accent);
    font-size: 0.9rem; font-weight: 700; cursor: pointer;
    font-family: inherit;
  }
  .more-btn:hover { border-color: var(--accent); }
  footer { text-align: center; color: var(--text-muted); font-size: 0.78rem; margin-top: 48px; }
</style>
</head>
<body>
  <nav>
    <a class="brand" href="index.html">📰 올딜 NEW'S</a>
  </nav>

  <div class="wrap">
    <header class="hero">
      <h1>올딜 NEW'S</h1>
      <p id="hero-sub">뉴스 다이제스트</p>
    </header>

    <div id="sections"></div>

    <footer>
      본 사이트의 내용은 공개 검색 결과를 바탕으로 요약·재구성되었습니다. 이미지는 CC 라이선스 하에 재사용이 허용된 사진(Openverse)을 사용했습니다.<br>
      올딜 NEW'S
    </footer>
  </div>

<script>
// ===== 게시물 데이터 (매일 자동 갱신됨) =====
const POSTS = [
  { slug: "special-counsel-extension-bill", title: "2차 종합특검 연장 법안, 국회 본회의 상정", category: "정치", date: "2026-07-20" },
  { slug: "lee-president-sns-controversy", title: "이재명 대통령, SNS 발언으로 여당 내 파장", category: "정치", date: "2026-07-20" },
  { slug: "won-internationalization-roadmap", title: "정부, '원화 국제화 로드맵' 발표", category: "경제", date: "2026-07-20" },
  { slug: "weekly-financial-schedule", title: "이번 주 국내 주요 금융 일정", category: "경제", date: "2026-07-20" },
  { slug: "incheon-coupang-warehouse-fire", title: "인천 쿠팡 물류센터 화재, 사흘째 지속", category: "사회", date: "2026-07-20" },
  { slug: "police-investigation-reform-pledge", title: "경찰청, '장윤기 사건' 관련 수사 쇄신 약속", category: "사회", date: "2026-07-20" },
  { slug: "aw2026-smart-factory-robotics", title: "AW 2026, 스마트팩토리·로보틱스 기술 총출동", category: "IT/과학", date: "2026-07-20" },
  { slug: "google-ai-for-business-2026", title: "구글, 'AI 포 비즈니스 2026' 개최", category: "IT/과학", date: "2026-07-20" },
  { slug: "cho-seongjin-kiaf-seoul-2026", title: "피아니스트 조성진, '키아프 서울 2026' 특별 공연", category: "생활/문화", date: "2026-07-20" },
  { slug: "summer-vacation-empty-house-crime", title: "여름 휴가철, 빈집 범죄 우려 확산", category: "생활/문화", date: "2026-07-20" }
];
// ============================================

const CATEGORIES = [
  { name: "정치", emoji: "🏛️" },
  { name: "경제", emoji: "💰" },
  { name: "사회", emoji: "🏙️" },
  { name: "IT/과학", emoji: "💻" },
  { name: "생활/문화", emoji: "🎨" }
];
const SHOW_COUNT = 8;

const container = document.getElementById("sections");
const dates = POSTS.map(p => p.date).sort();
if (dates.length) {
  document.getElementById("hero-sub").textContent =
    "최근 업데이트 " + dates[dates.length - 1] + " · 총 " + POSTS.length + "건";
}

CATEGORIES.forEach(cat => {
  const posts = POSTS
    .filter(p => p.category === cat.name)
    .sort((a, b) => b.date.localeCompare(a.date));
  if (!posts.length) return;

  const h2 = document.createElement("h2");
  h2.className = "section-title";
  h2.textContent = cat.emoji + " " + cat.name;
  container.appendChild(h2);

  const list = document.createElement("div");
  list.className = "list";
  posts.forEach((p, i) => {
    const a = document.createElement("a");
    a.className = "item" + (i >= SHOW_COUNT ? " hidden" : "");
    a.href = p.slug + ".html";
    a.innerHTML =
      '<span class="t"><span class="badge">' + cat.name + '</span>' +
      '<h3></h3></span><span class="date">' + p.date + '</span>';
    a.querySelector("h3").textContent = p.title;
    list.appendChild(a);
  });
  container.appendChild(list);

  if (posts.length > SHOW_COUNT) {
    const btn = document.createElement("button");
    btn.className = "more-btn";
    btn.textContent = "더보기 (" + (posts.length - SHOW_COUNT) + "건)";
    btn.addEventListener("click", () => {
      const hidden = list.querySelectorAll(".item.hidden");
      if (hidden.length) {
        hidden.forEach(el => el.classList.remove("hidden"));
        btn.textContent = "접기";
      } else {
        list.querySelectorAll(".item").forEach((el, i) => {
          if (i >= SHOW_COUNT) el.classList.add("hidden");
        });
        btn.textContent = "더보기 (" + (posts.length - SHOW_COUNT) + "건)";
      }
    });
    container.appendChild(btn);
  }
});
</script>
</body>
</html>
